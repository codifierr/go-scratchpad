---
apiVersion: v1
kind: ConfigMap
metadata:
  name: es-bulk-proxy-config
  namespace: default
data:
  ES_URL: "http://elasticsearch:9200"
  FLUSH_INTERVAL: "3s"
  MAX_BATCH_SIZE: "5242880"      # 5MB
  MAX_BUFFER_SIZE: "52428800"    # 50MB
  PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: es-bulk-proxy
  namespace: default
  labels:
    app: es-bulk-proxy
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: es-bulk-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: es-bulk-proxy
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: es-bulk-proxy
        image: es-bulk-proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: es-bulk-proxy-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      terminationGracePeriodSeconds: 30
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: es-bulk-proxy
  namespace: default
  labels:
    app: es-bulk-proxy
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: es-bulk-proxy

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: es-bulk-proxy-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: es-bulk-proxy
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# Optional: ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: es-proxy
  namespace: default
  labels:
    app: es-proxy
spec:
  selector:
    matchLabels:
      app: es-proxy
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics

---
# Optional: PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: es-proxy-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: es-proxy
